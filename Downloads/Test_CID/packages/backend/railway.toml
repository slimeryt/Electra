# Use when Railway "Root Directory" is: Downloads/Test_CID/packages/backend
# (same folder as this file in the GitHub repo).
#
# If deploy build shows `tsc -p tsconfig.json`, you're on the right service root.
# If you use monorepo root (Downloads/Test_CID) instead, set Start Command to:
#   cd packages/backend && node dist/index.js
# and Build Command to build the backend only, or use a Dockerfile.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
