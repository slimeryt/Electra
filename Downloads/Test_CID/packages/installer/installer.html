<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Electra Installer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      user-select: none; -webkit-app-region: drag;
      position: relative;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; }
    .orb-1 { width:220px;height:220px;background:radial-gradient(circle,rgba(88,101,242,.35) 0%,transparent 70%);top:-60px;left:-60px;animation:drift1 6s ease-in-out infinite; }
    .orb-2 { width:180px;height:180px;background:radial-gradient(circle,rgba(120,90,255,.22) 0%,transparent 70%);bottom:-40px;right:-40px;animation:drift2 8s ease-in-out infinite; }
    .orb-3 { width:120px;height:120px;background:radial-gradient(circle,rgba(88,101,242,.18) 0%,transparent 70%);bottom:60px;left:20px;animation:drift3 7s ease-in-out infinite; }
    @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,15px) scale(1.08)}}
    @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,-20px) scale(1.06)}}
    @keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(12px,-18px)}}

    .card {
      position: relative; display: flex; flex-direction: column; align-items: center;
      padding: 36px 40px 32px;
      background: rgba(14,14,24,.85); border: 1px solid rgba(255,255,255,.07);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px rgba(88,101,242,.12), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      animation: floatCard 4s ease-in-out infinite;
    }
    @keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

    .logo {
      width:76px;height:76px;
      background:linear-gradient(135deg,#4f5ce0 0%,#7983f5 50%,#8b7cf8 100%);
      border-radius:22px; display:flex; align-items:center; justify-content:center;
      margin-bottom:18px;
      box-shadow:0 8px 32px rgba(88,101,242,.55),0 0 0 1px rgba(255,255,255,.12),inset 0 1px 0 rgba(255,255,255,.2);
      animation:logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse{
      0%,100%{box-shadow:0 8px 32px rgba(88,101,242,.55),0 0 0 1px rgba(255,255,255,.12),inset 0 1px 0 rgba(255,255,255,.2)}
      50%{box-shadow:0 12px 48px rgba(88,101,242,.75),0 0 0 1px rgba(255,255,255,.16),inset 0 1px 0 rgba(255,255,255,.2)}
    }
    .logo svg { width:44px;height:44px;fill:white; }

    .app-name {
      font-size:24px; font-weight:800; letter-spacing:-.3px;
      background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.7));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:6px;
    }
    .status {
      font-size:11.5px; color:rgba(255,255,255,.38); margin-bottom:26px;
      letter-spacing:.4px; min-height:16px; transition:opacity .3s ease;
    }
    .progress-track {
      width:160px;height:2.5px; background:rgba(255,255,255,.07);
      border-radius:99px; overflow:hidden; position:relative;
    }
    .progress-bar {
      height:100%; width:0%; background:linear-gradient(90deg,#4752c4,#7983f5,#a78bfa);
      border-radius:99px; transition:width .4s cubic-bezier(.4,0,.2,1); position:relative;
    }
    .progress-bar::after {
      content:''; position:absolute; top:0; right:0; width:40px; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
      animation:shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer{0%{transform:translateX(-40px);opacity:0}40%{opacity:1}100%{transform:translateX(20px);opacity:0}}

    .error {
      display:none; font-size:11px; color:#f04747; text-align:center;
      max-width:180px; line-height:1.5; margin-top:10px;
    }
    .version { position:absolute; bottom:14px; font-size:10px; color:rgba(255,255,255,.15); letter-spacing:.5px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 3L4 14h7l-2 7 9-11h-7l2-7z"/>
      </svg>
    </div>
    <div class="app-name">Electra</div>
    <div class="status" id="status">Preparing...</div>
    <div class="progress-track">
      <div class="progress-bar" id="progress"></div>
    </div>
    <div class="error" id="error"></div>
  </div>
  <div class="version" id="version">Installer</div>

  <script>
    const bar = document.getElementById('progress');
    const status = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const versionEl = document.getElementById('version');

    function setStatus(text) {
      status.style.opacity = '0';
      setTimeout(() => { status.textContent = text; status.style.opacity = '1'; }, 150);
    }
    function setProgress(pct) {
      bar.style.width = pct + '%';
    }
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    // Listen for progress events from main process
    window.addEventListener('installer-status', e => setStatus(e.detail.text));
    window.addEventListener('installer-progress', e => setProgress(e.detail.pct));
    window.addEventListener('installer-version', e => { versionEl.textContent = 'v' + e.detail.version; });
    window.addEventListener('installer-error', e => {
      setStatus('Installation failed');
      showError(e.detail.message);
    });

    setStatus('Checking for latest version...');
  </script>
</body>
</html>
