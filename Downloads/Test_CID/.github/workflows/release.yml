name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      PROJECT_ROOT: Downloads/Test_CID

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Downloads/Test_CID/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PROJECT_ROOT }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.PROJECT_ROOT }}/packages/frontend

      - name: Build & publish Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: node build-win.js --publish always
        working-directory: ${{ env.PROJECT_ROOT }}/packages/desktop

  # Debug APK for sideload — uploads after Windows release exists
  build-android:
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write
    env:
      PROJECT_ROOT: Downloads/Test_CID
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Downloads/Test_CID/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PROJECT_ROOT }}

      - name: Build frontend & Capacitor sync
        run: npm run build && npx cap sync android
        working-directory: ${{ env.PROJECT_ROOT }}/packages/frontend

      - name: Assemble debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        working-directory: ${{ env.PROJECT_ROOT }}/packages/frontend/android

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "${{ env.PROJECT_ROOT }}/packages/frontend/android/app/build/outputs/apk/debug/app-debug.apk" Electra-Android.apk
          gh release upload "${{ github.ref_name }}" Electra-Android.apk --clobber
