name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      PROJECT_ROOT: Downloads/Test_CID

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Downloads/Test_CID/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PROJECT_ROOT }}

      - name: Build frontend
        run: npm run build
        working-directory: ${{ env.PROJECT_ROOT }}/packages/frontend

      - name: Build & publish Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: node build-win.js --publish always
        working-directory: ${{ env.PROJECT_ROOT }}/packages/desktop
