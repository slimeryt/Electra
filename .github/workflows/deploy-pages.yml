# slimeryt.github.io/Electra → gh-pages. GitHub only runs workflows from repo-root .github/workflows/.
# Source: Downloads/Test_CID/docs
name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'Downloads/Test_CID/docs/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish docs site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: Downloads/Test_CID/docs
          force_orphan: false
