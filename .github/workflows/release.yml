name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Downloads/Test_CID/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Downloads/Test_CID

      - name: Build frontend
        env:
          # Baked into Electron + must match CI Android build (Capacitor needs absolute API URL).
          VITE_BACKEND_URL: https://electra-backend.up.railway.app
        run: npm run build
        working-directory: Downloads/Test_CID/packages/frontend

      - name: Build & publish Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: node build-win.js --publish always
        working-directory: Downloads/Test_CID/packages/desktop

  # Debug APK — must live in repo-root .github/workflows (GitHub ignores nested workflow dirs)
  build-android:
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Downloads/Test_CID/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Downloads/Test_CID

      - name: Build frontend & Capacitor sync
        env:
          VITE_BACKEND_URL: https://electra-backend.up.railway.app
        run: npm run build && npx cap sync android
        working-directory: Downloads/Test_CID/packages/frontend

      - name: Assemble debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        working-directory: Downloads/Test_CID/packages/frontend/android

      # electron-builder often creates a release from package.json version, not the git tag — upload then fails with "release not found".
      - name: Ensure GitHub release exists for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists."
          else
            echo "Creating release ${{ github.ref_name }}..."
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "Automated release. Windows installer from electron-builder; **Electra-Android.apk** from CI."
          fi

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "Downloads/Test_CID/packages/frontend/android/app/build/outputs/apk/debug/app-debug.apk" Electra-Android.apk
          gh release upload "${{ github.ref_name }}" Electra-Android.apk --clobber --repo "${{ github.repository }}"
